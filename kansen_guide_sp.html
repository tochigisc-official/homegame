    &lt;p style=&quot;font-size:14.5px; margin:0 0 6px&quot;&gt;飲食売店／グッズ売店／チケット売り場／CLUB.Tブース&lt;/p&gt;
    &lt;ul class=&quot;plain&quot;&gt;
      &lt;li&gt;グッズ売店内のガチャガチャは&lt;b&gt;現金払いのみ&lt;/b&gt;です。&lt;/li&gt;
      &lt;li&gt;イベント出店等のブースは「現金払いのみ」となる場合があります。&lt;/li&gt;
      &lt;li&gt;会場内でPayPayなどのQR決済や、Suica／nanaco／WAONの電子マネーの&lt;b&gt;チャージはできません&lt;/b&gt;。&lt;/li&gt;
    &lt;/ul&gt;

    &lt;h3&gt;使用可能なキャッシュレス決済&lt;/h3&gt;
    &lt;div class=&quot;logo-grid&quot;&gt;
      &lt;span class=&quot;logo&quot;&gt;ロゴ&lt;/span&gt;&lt;span class=&quot;logo&quot;&gt;ロゴ&lt;/span&gt;&lt;span class=&quot;logo&quot;&gt;ロゴ&lt;/span&gt;&lt;span class=&quot;logo&quot;&gt;ロゴ&lt;/span&gt;
      &lt;span class=&quot;logo&quot;&gt;ロゴ&lt;/span&gt;&lt;span class=&quot;logo&quot;&gt;ロゴ&lt;/span&gt;&lt;span class=&quot;logo&quot;&gt;ロゴ&lt;/span&gt;&lt;span class=&quot;logo&quot;&gt;ロゴ&lt;/span&gt;
      &lt;span class=&quot;logo&quot;&gt;ロゴ&lt;/span&gt;&lt;span class=&quot;logo&quot;&gt;ロゴ&lt;/span&gt;&lt;span class=&quot;logo&quot;&gt;ロゴ&lt;/span&gt;&lt;span class=&quot;logo&quot;&gt;ロゴ&lt;/span&gt;
    &lt;/div&gt;
    &lt;p class=&quot;memo&quot; style=&quot;margin-top:10px&quot;&gt;&lt;b&gt;制作メモ：&lt;/b&gt;対応ブランドの正式リストと各社ロゴデータの入手が必要です（各ブランドにロゴ使用規定あり）。枠数は仮で12。&lt;/p&gt;

    &lt;h3&gt;プリペイドカード（現金しか使えない方向け）&lt;/h3&gt;
    &lt;p style=&quot;font-size:14px; margin:0 0 6px&quot;&gt;キャッシュレス決済手段をお持ちでない方向けに、場内の発行機で現金をチャージして使えるプリペイドカードを用意しています。&lt;/p&gt;
    &lt;div class=&quot;rows&quot;&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;div class=&quot;rk&quot;&gt;栃木SC&lt;br&gt;オリジナルプリカ&lt;/div&gt;&lt;div class=&quot;rv&quot;&gt;グッズ売店でプリカ（500円）を購入し、チャージ機で現金をチャージして利用&lt;span class=&quot;note&quot;&gt;有効期限：最終利用日から10年間／払い戻し不可／店舗の決済端末にタッチして利用／栃木SCのホームゲームでのみ使用可&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;row&quot;&gt;&lt;div class=&quot;rk&quot;&gt;1Day Jプリカ&lt;/div&gt;&lt;div class=&quot;rv&quot;&gt;無料で発行できるレシートタイプ。チャージ機で発行し、現金をチャージして利用&lt;span class=&quot;note&quot;&gt;有効期限：当日限り／払い戻しはBゲートにて当日限り可（試合終了後30分まで）／店舗の決済端末にQRコードをかざして利用&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ph&quot;&gt;【画像枠】プリペイドカード2種の見本&lt;br&gt;（オリジナルプリカ／1Day Jプリカ）&lt;/div&gt;
    &lt;div class=&quot;ph&quot;&gt;【画像枠】チャージ機のスタジアム内配置図&lt;br&gt;※動員見込みにより配置変更の場合あり&lt;/div&gt;

    &lt;h3&gt;よくある質問&lt;/h3&gt;
    &lt;details&gt;
      &lt;summary&gt;プリカを失くしたら再発行や保証はありますか？&lt;/summary&gt;
      &lt;div class=&quot;body&quot;&gt;&lt;p&gt;再発行や保証はありません。自己責任でお取り扱いください。&lt;/p&gt;&lt;/div&gt;
    &lt;/details&gt;
    &lt;details&gt;
      &lt;summary&gt;複数の決済方法を併用できますか？&lt;/summary&gt;
      &lt;div class=&quot;body&quot;&gt;&lt;p&gt;いいえ。一つの決済方法でのみ決済可能です。複数枚の「1Day Jプリカ」を合算して使うこともできません。&lt;/p&gt;&lt;/div&gt;
    &lt;/details&gt;
    &lt;details&gt;
      &lt;summary&gt;電子マネーの残高照会はできますか？&lt;/summary&gt;
      &lt;div class=&quot;body&quot;&gt;&lt;p&gt;場内のチャージ機器、または各店舗の決済端末で残高照会が可能です。&lt;/p&gt;&lt;/div&gt;
    &lt;/details&gt;
    &lt;div class=&quot;memo&quot;&gt;プリペイドカードは、キャッシュレス決済のご利用が難しい方のための補助的な手段です。スムーズなお買い物のため、できるだけ普段お使いのキャッシュレス決済をご用意のうえご来場ください。&lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- ============ 3 入場・待機列（共通） ============ --&gt;
  &lt;section class=&quot;sec&quot; id=&quot;gate&quot;&gt;
    &lt;div class=&quot;kick&quot;&gt;
      &lt;span class=&quot;ico&quot;&gt;&lt;svg viewBox=&quot;0 0 24 24&quot;&gt;&lt;path d=&quot;M4 21V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v16&quot;/&gt;&lt;path d=&quot;M2 21h20&quot;/&gt;&lt;path d=&quot;M14 12h.01&quot;/&gt;&lt;path d=&quot;M10 3v18&quot;/&gt;&lt;/svg&gt;&lt;/span&gt;
      &lt;span class=&quot;en&quot;&gt;Entry&lt;/span&gt;
    &lt;/div&gt;
    &lt;h2&gt;入場・待機列&lt;/h2&gt;
    &lt;p class=&quot;desc&quot;&gt;開場前から並んで席を確保したい方向けのご案内です。指定席の方や、キックオフに合わせて来場する方は、この項目を読まなくても大丈夫です。&lt;/p&gt;

    &lt;h3&gt;待機列について&lt;/h3&gt;
    &lt;ul class=&quot;plain&quot;&gt;
      &lt;li&gt;26/27シーズンでは「入場待機列事前申込み制度」は実施しません。&lt;/li&gt;
      &lt;li&gt;待機列では、お持ち込みいただいた折り畳み型の椅子やレジャーシートを利用できます。&lt;b&gt;縦・横ともに1m以内&lt;/b&gt;のものをご使用ください。&lt;/li&gt;
    &lt;/ul&gt;

    &lt;h3&gt;シート貼りについて&lt;/h3&gt;
    &lt;ul class=&quot;plain&quot;&gt;
      &lt;li&gt;シート貼りによる入場待機列の確保が可能です。使用するシートは&lt;b&gt;布テープまたは養生テープ&lt;/b&gt;で固定してください。&lt;/li&gt;
      &lt;li&gt;1つのシートにつき&lt;b&gt;5名まで&lt;/b&gt;待機列を確保できます（5名を超える場合はテープを分けて設置）。&lt;/li&gt;
      &lt;li&gt;シートには「&lt;b&gt;①待機列番号 ②代表者名 ③人数（5名まで）&lt;/b&gt;」を必ずご記入ください。&lt;/li&gt;
      &lt;li&gt;割り込みや、シートに記載した人数を超える方を待機列へ加える行為は認められません。確認された場合は、関係者全員を列の最後尾へご案内する場合があります。&lt;/li&gt;
      &lt;li&gt;シート貼りに使用したテープは、入場前に必ずご自身で撤去してください。&lt;/li&gt;
      &lt;li class=&quot;note&quot; style=&quot;list-style:none; margin-left:-1.15em&quot;&gt;※シートや荷物の盗難・紛失・破損、テープの剥がれ等について、クラブは一切の責任を負いません。&lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;band&quot;&gt;シート貼り開始時刻・入場時刻・列整理時刻などの運用は試合により異なります。詳細は&lt;b&gt;各試合のホームゲームページ&lt;/b&gt;でご確認ください。&lt;/div&gt;

    &lt;h3&gt;よくある質問&lt;/h3&gt;
    &lt;details&gt;
      &lt;summary&gt;ビン・缶の持ち込みはできますか？&lt;/summary&gt;
      &lt;div class=&quot;body&quot;&gt;&lt;p&gt;できません。場内で発見した場合は破棄等をお願いする場合があります。入場ゲート前での移し替えサービスは実施していないため、必要な場合は紙コップ等をご自身でご用意ください。&lt;/p&gt;&lt;/div&gt;
    &lt;/details&gt;
    &lt;details&gt;
      &lt;summary&gt;何歳からチケットが必要ですか？&lt;/summary&gt;
      &lt;div class=&quot;body&quot;&gt;&lt;p&gt;小学生以上の方はチケットが必要です。未就学児は保護者の膝上で観戦する場合はチケット不要、座席を利用する場合はチケットをお買い求めください。マスコットやぬいぐるみ等で座席を使用する場合も、小中高チケットが必要です。&lt;/p&gt;&lt;/div&gt;
    &lt;/details&gt;
    &lt;details&gt;
      &lt;summary&gt;ベビーカーは預かってもらえますか？&lt;/summary&gt;
      &lt;div class=&quot;body&quot;&gt;&lt;p&gt;ベビーカーやキャリーケース等、自席に収まらないサイズのお荷物は保管スペースを利用できます。入場ゲート係員へお声がけください。盗難・紛失等については責任を負いかねます。&lt;/p&gt;&lt;/div&gt;
    &lt;/details&gt;
  &lt;/section&gt;

  &lt;!-- ============ 4 観戦ルール（共通） ============ --&gt;
  &lt;section class=&quot;sec&quot; id=&quot;rules&quot;&gt;
    &lt;div class=&quot;kick&quot;&gt;
      &lt;span class=&quot;ico&quot;&gt;&lt;svg viewBox=&quot;0 0 24 24&quot;&gt;&lt;path d=&quot;M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z&quot;/&gt;&lt;path d=&quot;M9 12l2 2 4-4&quot;/&gt;&lt;/svg&gt;&lt;/span&gt;
      &lt;span class=&quot;en&quot;&gt;Rules &amp; Manners&lt;/span&gt;
    &lt;/div&gt;
    &lt;h2&gt;観戦のルール・マナー&lt;/h2&gt;
    &lt;p class=&quot;desc&quot;&gt;スタジアムは、子どもから大人まで、みんなで試合を楽しむ場所です。すべての方に安全・快適に観戦いただくため、Jリーグ共通のルールに加えて、栃木SCの観戦ルール＆マナーを定めています。&lt;/p&gt;
    &lt;p class=&quot;memo&quot; style=&quot;margin:0 0 14px&quot;&gt;スタジアム管理区域に入場された時点で、本ルールおよびJリーグ試合運営管理規程に同意いただいたものとみなします。&lt;b&gt;記載の有無にかかわらず、行為がルールに該当するかどうかの最終判断は、クラブまたはJリーグが行います。&lt;/b&gt;&lt;/p&gt;

    &lt;details open&gt;
      &lt;summary&gt;持ち込み禁止物&lt;/summary&gt;
      &lt;div class=&quot;body&quot;&gt;&lt;ul&gt;
        &lt;li&gt;ビン・缶類（入場ゲート前での移し替えサービスなし。紙コップ等はご自身でご用意ください）&lt;/li&gt;
        &lt;li&gt;ペット（盲導犬・介助犬・聴導犬を除く）&lt;/li&gt;
        &lt;li&gt;爆竹・花火・発煙筒・ガスホーン等の危険物&lt;/li&gt;
        &lt;li&gt;銃刀類・火器・毒劇物その他法令により所持・持ち込みが禁止されている物&lt;/li&gt;
        &lt;li&gt;椅子（車椅子を除く）&lt;/li&gt;
        &lt;li&gt;サッカーボール（ボールネットやバッグ等に収納した状態を除く）&lt;/li&gt;
        &lt;li&gt;ドローン等の無人航空機&lt;/li&gt;
        &lt;li&gt;その他、クラブが安全上支障があると判断した物&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
    &lt;/details&gt;

    &lt;details&gt;
      &lt;summary&gt;禁止行為（安全を損なう行為）&lt;/summary&gt;
      &lt;div class=&quot;body&quot;&gt;&lt;ul&gt;
        &lt;li&gt;椅子に立ち上がっての観戦・応援&lt;/li&gt;
        &lt;li&gt;フェンス・手すりに腰掛ける、またがる、身を乗り出す、足を掛ける行為&lt;/li&gt;
        &lt;li&gt;場内を走り回る行為／観客席でのボール類の使用&lt;/li&gt;
        &lt;li&gt;通路に立ち止まっての観戦・写真撮影&lt;/li&gt;
        &lt;li&gt;仮設物の無断設置／危険物の使用&lt;/li&gt;
        &lt;li&gt;運営の妨げとなる行為（集団での抗議活動、バス止め等）&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
    &lt;/details&gt;

    &lt;details&gt;
      &lt;summary&gt;禁止行為（他のお客様の迷惑となる行為）&lt;/summary&gt;
      &lt;div class=&quot;body&quot;&gt;&lt;ul&gt;
        &lt;li&gt;必要以上の座席の確保、荷物等を使用した長時間の座席確保&lt;/li&gt;
        &lt;li&gt;他のお客様の観戦を妨げる行為／通路や避難導線を塞ぐ行為&lt;/li&gt;
        &lt;li&gt;ごみを分別せず、指定場所以外へ廃棄する行為&lt;/li&gt;
        &lt;li&gt;スタジアム場外での鳴り物等の利用・集団での応援行為（バス待ち、決起集会等）&lt;/li&gt;
        &lt;li&gt;近隣住民への迷惑となる行為（21時以降の鳴り物の使用等）&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
    &lt;/details&gt;

    &lt;details&gt;
      &lt;summary&gt;写真・動画撮影について&lt;/summary&gt;
      &lt;div class=&quot;body&quot;&gt;
        &lt;div class=&quot;oxs&quot;&gt;
          &lt;div&gt;シーン&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;写真&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;動画&lt;/div&gt;
          &lt;div&gt;試合中（ピッチ上のプレー）&lt;/div&gt;&lt;div class=&quot;c ok&quot;&gt;〇&lt;/div&gt;&lt;div class=&quot;c ng&quot;&gt;✕&lt;/div&gt;
          &lt;div&gt;試合中以外（スタンド・コンコース・場外等）&lt;/div&gt;&lt;div class=&quot;c ok&quot;&gt;〇&lt;/div&gt;&lt;div class=&quot;c ok&quot;&gt;〇&lt;/div&gt;
        &lt;/div&gt;
        &lt;ul style=&quot;margin-top:10px&quot;&gt;
          &lt;li&gt;試合中のピッチ上のプレーの動画撮影、SNS・動画配信サービス等での配信は禁止です。&lt;/li&gt;
          &lt;li&gt;撮影は一般のお客様が立ち入り可能なエリアに限ります。関係者エリア（選手・スタッフエリア等）を対象とした動画撮影は、一般エリアから見える場合でも禁止です（クラブが事前承認した場合を除く）。&lt;/li&gt;
          &lt;li&gt;三脚・一脚等の大型機材を使用した撮影は禁止です。&lt;/li&gt;
          &lt;li&gt;営利目的での写真・動画撮影は禁止です。&lt;/li&gt;
          &lt;li&gt;他のお客様の観戦や試合運営の妨げとなる撮影行為は禁止です。&lt;/li&gt;
          &lt;li&gt;Jリーグが定める「写真・動画等の撮影及び配信・送信規程」を遵守してください。&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/details&gt;

    &lt;details&gt;
      &lt;summary&gt;その他の禁止事項&lt;/summary&gt;
      &lt;div class=&quot;body&quot;&gt;&lt;ul&gt;
        &lt;li&gt;選手・監督・審判・対戦クラブ・サポーター・スタッフ・ボランティア等への誹謗中傷、侮辱、威嚇、差別的言動、ハラスメント&lt;/li&gt;
        &lt;li&gt;拡声器の不正使用／レーザーポインター等、競技運営を妨げる機器の使用&lt;/li&gt;
        &lt;li&gt;承認を受けていないポスター・ビラ等の配布、掲示、募金活動、署名活動、物品販売&lt;/li&gt;
        &lt;li&gt;指定場所以外での喫煙&lt;/li&gt;
        &lt;li&gt;チケットに記載された席種・エリア以外での観戦&lt;/li&gt;
        &lt;li&gt;各入場ゲートの管理開始時刻以前に、荷物やシート等で場所を確保する行為（前日からの場所取りを含む）&lt;/li&gt;
        &lt;li&gt;その他、クラブが試合運営や安全確保の妨げになると判断した行為&lt;/li&gt;
      &lt;/ul&gt;&lt;/div&gt;
    &lt;/details&gt;

    &lt;details&gt;
      &lt;summary&gt;違反行為への対応&lt;/summary&gt;
      &lt;div class=&quot;body&quot;&gt;
        &lt;p&gt;ルールに違反する行為があった場合や、係員・警備員の指示に従っていただけない場合は、状況に応じて退場等の対応を行う場合があります。悪質な行為については、Jリーグ試合運営管理規程その他の関係規程に基づき、栃木SCホームゲームまたはJリーグ公式試合への入場禁止措置、関係機関への連絡等を行うことがあります。&lt;/p&gt;
        &lt;p&gt;ほとんどの方には関係のない項目です。すべての方が安心して観戦できるスタジアムを守るためのものとして、ご理解ください。&lt;/p&gt;
      &lt;/div&gt;
    &lt;/details&gt;

    &lt;div class=&quot;ph&quot;&gt;【画像枠】Jリーグ共通観戦ルール＆マナー 図版&lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- ============ 5 横断幕（会場依存＋共通） ============ --&gt;
  &lt;section class=&quot;sec&quot; id=&quot;banner&quot;&gt;
    &lt;div class=&quot;kick&quot;&gt;
      &lt;span class=&quot;ico&quot;&gt;&lt;svg viewBox=&quot;0 0 24 24&quot;&gt;&lt;path d=&quot;M4 4v17&quot;/&gt;&lt;path d=&quot;M4 5h15l-3 4 3 4H4&quot;/&gt;&lt;/svg&gt;&lt;/span&gt;
      &lt;span class=&quot;en&quot;&gt;Banner&lt;/span&gt;
      &lt;span class=&quot;tag&quot;&gt;会場で変わる&lt;/span&gt;
    &lt;/div&gt;
    &lt;h2&gt;横断幕の掲出&lt;/h2&gt;
    &lt;p class=&quot;desc&quot;&gt;チームを後押しする横断幕を、みんなが気持ちよく掲げられるように、受付とルールをご案内します。&lt;/p&gt;

    &lt;div class=&quot;venue-block&quot; data-venue=&quot;kanseki&quot;&gt;
      &lt;div class=&quot;rows&quot;&gt;
        &lt;div class=&quot;row&quot;&gt;&lt;div class=&quot;rk&quot;&gt;受付ゲート&lt;/div&gt;&lt;div class=&quot;rv&quot;&gt;&lt;span class=&quot;vpill&quot;&gt;カンスタ&lt;/span&gt;&lt;br&gt;ホーム側の事前掲出は &lt;b&gt;Cゲート&lt;/b&gt;で受付&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;venue-block&quot; data-venue=&quot;green&quot;&gt;
      &lt;div class=&quot;rows&quot;&gt;
        &lt;div class=&quot;row&quot;&gt;&lt;div class=&quot;rk&quot;&gt;受付ゲート&lt;/div&gt;&lt;div class=&quot;rv&quot;&gt;&lt;span class=&quot;vpill&quot;&gt;グリスタ&lt;/span&gt;&lt;br&gt;ホーム側の事前掲出は &lt;b&gt;北ゲート&lt;/b&gt;で受付&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;h3&gt;掲出のルール&lt;/h3&gt;
    &lt;ul class=&quot;plain&quot;&gt;
      &lt;li&gt;横断幕は&lt;b&gt;指定されたエリアのみ&lt;/b&gt;掲出できます。掲出は&lt;b&gt;先着順&lt;/b&gt;です。&lt;/li&gt;
      &lt;li&gt;固定は&lt;b&gt;ひものみ&lt;/b&gt;可能です（テープ類での固定は禁止）。&lt;/li&gt;
      &lt;li&gt;通路をまたぐ掲出は禁止です。座席への掲出も禁止です。&lt;/li&gt;
      &lt;li&gt;2層目ブロックは最前列手すり部分（手すりから2mまで）のみ、3層目ブロックは最前列手すり部分のみ掲出できます。&lt;/li&gt;

  &lt;!-- ============ 6 ビジターの方へ（会場依存） ============ --&gt;
  &lt;section class=&quot;sec&quot; id=&quot;visitor&quot;&gt;
    &lt;div class=&quot;kick&quot;&gt;
      &lt;span class=&quot;ico&quot;&gt;&lt;svg viewBox=&quot;0 0 24 24&quot;&gt;&lt;circle cx=&quot;12&quot; cy=&quot;8&quot; r=&quot;3.5&quot;/&gt;&lt;path d=&quot;M5 20c1.2-3.4 3.8-5 7-5s5.8 1.6 7 5&quot;/&gt;&lt;/svg&gt;&lt;/span&gt;

      &lt;div class=&quot;rows&quot;&gt;
        &lt;div class=&quot;row&quot;&gt;&lt;div class=&quot;rk&quot;&gt;ベンチ位置&lt;/div&gt;&lt;div class=&quot;rv&quot;&gt;&lt;span class=&quot;vpill&quot;&gt;グリスタ&lt;/span&gt;&lt;br&gt;ビジターチームベンチは、メインスタンドから見て&lt;b&gt;右側&lt;/b&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;

    ※本ガイドと各試合のホームゲームページの記載が異なる場合は、各試合ページの最新情報を優先します。&lt;br&gt;
    ※画像枠には実データを差し込みます。決済ロゴ・掲出エリア図・アクセスマップは素材待ち。
  &lt;/div&gt;
&lt;/footer&gt;

&lt;script&gt;
(function(){
  var blocks = Array.prototype.slice.call(document.querySelectorAll(&#x27;.venue-block&#x27;));
  var vbtns  = Array.prototype.slice.call(document.querySelectorAll(&#x27;.vtoggle button&#x27;));
  var NAMES  = { kanseki:&#x27;カンセキスタジアムとちぎ&#x27;, green:&#x27;栃木県グリーンスタジアム&#x27; };

  function apply(venue, animate){
    if(venue !== &#x27;kanseki&#x27; &amp;&amp; venue !== &#x27;green&#x27;) venue = &#x27;kanseki&#x27;;
    document.body.classList.toggle(&#x27;is-green&#x27;, venue === &#x27;green&#x27;);
    blocks.forEach(function(el){
      var on = el.dataset.venue === venue;
      el.classList.toggle(&#x27;is-on&#x27;, on);
      if(on &amp;&amp; animate){
        el.classList.remove(&#x27;vb-anim&#x27;);
        void el.offsetWidth;
        el.classList.add(&#x27;vb-anim&#x27;);
      }
    });
    vbtns.forEach(function(b){
      b.setAttribute(&#x27;aria-pressed&#x27;, b.dataset.venue === venue ? &#x27;true&#x27; : &#x27;false&#x27;);
    });
    document.getElementById(&#x27;venue-full&#x27;).textContent = NAMES[venue];
    document.getElementById(&#x27;venue-name-foot&#x27;).textContent = NAMES[venue];
    try{
      var url = new URL(window.location.href);
      url.searchParams.set(&#x27;venue&#x27;, venue);
      history.replaceState(null, &#x27;&#x27;, url);
    }catch(e){}
  }

  /* 切替＝追従帯のトグルのみ（常に画面内・位置不変） */
  vbtns.forEach(function(b){
    b.addEventListener(&#x27;click&#x27;, function(){ apply(b.dataset.venue, true); });
  });

  var initVenue = &#x27;kanseki&#x27;, backUrl = null;
  try{
    var sp = new URLSearchParams(window.location.search);
    if(sp.get(&#x27;venue&#x27;)) initVenue = sp.get(&#x27;venue&#x27;);
    backUrl = sp.get(&#x27;back&#x27;);
  }catch(e){}
  apply(initVenue, false);

  if(backUrl &amp;&amp; /^[\w./-]+\.html$/.test(backUrl)){
    document.getElementById(&#x27;lp-link&#x27;).href = &#x27;https://tochigisc-official.github.io/homegame/&#x27; + backUrl;
  }

  /* 追従ヘッダーの実高を計測して scroll-margin に反映 */
  var stickyEl = document.getElementById(&#x27;sticky-top&#x27;);
  function setStickyH(){
    document.documentElement.style.setProperty(&#x27;--sticky-h&#x27;, stickyEl.offsetHeight + &#x27;px&#x27;);
  }
  window.addEventListener(&#x27;resize&#x27;, setStickyH);
  if(document.fonts &amp;&amp; document.fonts.ready){ document.fonts.ready.then(setStickyH); }
  setStickyH();

  /* ナビ右端フェード：末端で消す（見切れチップと併用のアフォーダンス） */
  var scroller = document.querySelector(&#x27;.nav-scroller&#x27;);
  var navEl = scroller.querySelector(&#x27;nav&#x27;);
  function updateFade(){
    var atEnd = navEl.scrollLeft + navEl.clientWidth &gt;= navEl.scrollWidth - 4;
    scroller.classList.toggle(&#x27;at-end&#x27;, atEnd);
  }
  navEl.addEventListener(&#x27;scroll&#x27;, updateFade, {passive:true});
  window.addEventListener(&#x27;resize&#x27;, updateFade);
  updateFade();

  /* 現在地セクションのチップを紺反転＋ナビ内へ自動追い込み */
  var links = Array.prototype.slice.call(document.querySelectorAll(&#x27;.navbar nav a&#x27;));
  var secs = links.map(function(a){ return document.querySelector(a.getAttribute(&#x27;href&#x27;)); });
  if(&#x27;IntersectionObserver&#x27; in window){
    var cur = null;
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(en){ if(en.isIntersecting) cur = en.target.id; });
      var changed = false;
      links.forEach(function(a){
        var on = a.getAttribute(&#x27;href&#x27;) === &#x27;#&#x27; + cur;
        if(on &amp;&amp; !a.classList.contains(&#x27;is-active&#x27;)) changed = true;
        a.classList.toggle(&#x27;is-active&#x27;, on);
      });
      if(changed){
        var act = document.querySelector(&#x27;.navbar nav a.is-active&#x27;);
        if(act) act.scrollIntoView({behavior:&#x27;smooth&#x27;, block:&#x27;nearest&#x27;, inline:&#x27;center&#x27;});
      }
    }, { rootMargin:&#x27;-30% 0px -60% 0px&#x27; });
    secs.forEach(function(s){ if(s) io.observe(s); });
    /* ページ最下部では最終セクションを強制アクティブ（判定帯に届かない対策） */
    window.addEventListener(&#x27;scroll&#x27;, function(){
      if(window.innerHeight + window.scrollY &gt;= document.documentElement.scrollHeight - 8){
        links.forEach(function(a,i){ a.classList.toggle(&#x27;is-active&#x27;, i === links.length - 1); });
      }
    }, {passive:true});
  }
})();
&lt;/script&gt;
